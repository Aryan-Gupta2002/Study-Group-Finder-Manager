<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync — Requests</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <span class="logo">StudySync_</span>
    <div class="nav-links">
      <a href="groups.html">Groups</a>
      <a href="requests.html">Requests</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">Join Requests</div>
    <div class="page-sub">Manage incoming requests for your groups</div>

    <div id="alert" class="alert"></div>
    <div id="requests-list"></div>
  </div>

  <script src="utils.js"></script>
  <script>
    requireAuth();

    async function loadRequests() {
      const list = document.getElementById('requests-list');
      list.innerHTML = '<div class="empty"><span>⏳</span>Loading...</div>';
      try {
        const requests = await apiFetch('/requests/incoming');
        if (!requests.length) {
          list.innerHTML = '<div class="empty"><span>✅</span>No pending requests.</div>';
          return;
        }
        list.innerHTML = `
          <div class="card">
            ${requests.map(r => `
              <div class="req-row">
                <div class="req-info">
                  <div class="req-name">${r.requester_name}</div>
                  <div class="req-meta">${r.email} · wants to join <strong>${r.group_name}</strong></div>
                </div>
                <div class="req-actions">
                  <button class="btn btn-primary btn-sm" onclick="respond(${r.request_id}, 'accepted')">Accept</button>
                  <button class="btn btn-danger btn-sm" onclick="respond(${r.request_id}, 'rejected')">Reject</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        showAlert(document.getElementById('alert'), err.message);
      }
    }

    async function respond(request_id, status) {
      try {
        await apiFetch(`/requests/${request_id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status }),
        });
        showAlert(document.getElementById('alert'), `Request ${status}.`, 'success');
        loadRequests();
      } catch (err) {
        showAlert(document.getElementById('alert'), err.message);
      }
    }

    loadRequests();
  </script>
</body>
</html>
