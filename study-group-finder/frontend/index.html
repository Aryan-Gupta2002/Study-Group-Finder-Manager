<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="logo">StudySync_</div>
      <div class="tagline">Find your people. Study better.</div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <div id="alert" class="alert"></div>

      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
      </div>

      <div id="signup-form" style="display:none">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="signup-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="signup()">Create Account</button>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script>
    if (getToken()) window.location.href = 'groups.html';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('login-form').style.display  = tab === 'login'  ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    }

    async function login() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const alert    = document.getElementById('alert');
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ name: data.name }));
        window.location.href = 'groups.html';
      } catch (err) {
        showAlert(alert, err.message);
      }
    }

    async function signup() {
      const name     = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const alert    = document.getElementById('alert');
      try {
        await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ name, email, password }),
        });
        showAlert(alert, 'Account created! Please login.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } catch (err) {
        showAlert(alert, err.message);
      }
    }
  </script>
</body>
</html>
